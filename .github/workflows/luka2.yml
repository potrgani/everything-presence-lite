name: Build & Release ESPHome Firmware

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

concurrency:
  group: esphome-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # 🔥 FIX: install ESPHome CLI
      - name: Install ESPHome
        run: |
          python3 -m pip install --upgrade pip
          pip3 install esphome

      - name: Discover YAML files
        id: meta
        run: |
          FILES=$(find . -maxdepth 1 -name "*.yaml" \
            | jq -R -s -c 'split("\n") | map(select(length>0))')

          echo "files=$FILES" >> $GITHUB_OUTPUT

      - name: Build firmware
        run: |
          mkdir -p dist

          echo '${{ steps.meta.outputs.files }}' | jq -r '.[]' | while read file; do
            echo "Building $file"

            name=$(basename "$file" .yaml)

            esphome compile "$file"

            mkdir -p "dist/$name"

            # move firmware files safely
            find .esphome/build -name "*.bin" -exec cp {} "dist/$name/" \;
            find .esphome/build -name "*.elf" -exec cp {} "dist/$name/" \;

          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: esp-firmware
          path: dist

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: esp-firmware
          path: dist

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ESPHome Firmware ${{ github.ref_name }}
          files: dist/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
