name: Build ESPHome firmware

on:
  workflow_call:
    inputs:
      files:
        required: true
        type: string
      name:
        required: false
        type: string
        default: ESPHome
      clean:
        required: false
        type: boolean
        default: true
      manifest_filename:
        required: false
        type: string
        default: manifest.json
      esphome_version:
        required: false
        type: string
        default: latest

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      files: ${{ steps.set.outputs.files }}
    steps:
      - uses: actions/checkout@v4

      - id: set
        run: |
          files=$(echo "${{ inputs.files }}" | jq -Rcn 'inputs | split(",")')
          echo "files=$files" >> $GITHUB_OUTPUT

  build:
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        file: ${{ fromJson(needs.prepare.outputs.files) }}

    outputs:
      project-version: ${{ steps.esphome.outputs.project-version }}

    steps:
      - uses: actions/checkout@v4

      - name: Build firmware
        id: esphome
        uses: esphome/build-action@v6
        with:
          yaml-file: ${{ matrix.file }}
          version: ${{ inputs.esphome_version }}

      - name: Prepare output
        run: |
          name=$(basename "${{ matrix.file }}" .yaml)
          mkdir -p output/$name

          mv "${{ steps.esphome.outputs.name }}" output/$name/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: esp-${{ matrix.file }}
          path: output

  publish:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Merge manifests
        run: |
          jq -s '{
            name: "${{ inputs.name }}",
            version: "latest",
            home_assistant_domain: "esphome",
            builds: (map(.builds) | add)
          }' dist/*/manifest.json > dist/${{ inputs.manifest_filename }}

      - name: Fix OTA paths
        run: |
          jq --arg name "${{ inputs.name }}" '
            .builds[].ota.path |= (split("/")[-2] + "/" + .)
          ' dist/${{ inputs.manifest_filename }} > dist/tmp.json

          mv dist/tmp.json dist/${{ inputs.manifest_filename }}

      - name: Copy static files
        run: cp -R static/* dist || true

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist
          clean: ${{ inputs.clean }}
          force: false
